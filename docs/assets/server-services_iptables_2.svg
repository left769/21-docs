<svg width="100%" viewBox="0 0 680 320" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- LAN zone -->
  <rect x="10" y="28" width="178" height="264" rx="12" fill="none" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.8"/>
  <text x="99" y="20" text-anchor="middle" font-size="12" fill="#1D9E75" font-weight="600">LAN · 192.168.1.0/24</text>
  <rect x="24" y="52" width="150" height="42" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="99" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">PC-1</text>
  <text x="99" y="84" text-anchor="middle" font-size="11" fill="#0F6E56">192.168.1.10</text>
  <rect x="24" y="108" width="150" height="42" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="99" y="124" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">PC-2</text>
  <text x="99" y="140" text-anchor="middle" font-size="11" fill="#0F6E56">192.168.1.20</text>
  <rect x="24" y="222" width="150" height="50" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="99" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">Внутрішній сервер</text>
  <text x="99" y="260" text-anchor="middle" font-size="11" fill="#185FA5">192.168.1.100:8080</text>
  <!-- Gateway -->
  <rect x="256" y="108" width="168" height="104" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="340" y="132" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">Linux Gateway</text>
  <text x="340" y="150" text-anchor="middle" font-size="10" fill="#854F0B">eth0: 192.168.1.1</text>
  <text x="340" y="166" text-anchor="middle" font-size="10" fill="#854F0B">eth1: 203.0.113.5</text>
  <text x="340" y="182" text-anchor="middle" font-size="10" fill="#888780">iptables · NAT · FORWARD</text>
  <text x="340" y="198" text-anchor="middle" font-size="10" fill="#888780">ip_forward = 1</text>
  <!-- Internet zone -->
  <rect x="492" y="28" width="178" height="264" rx="12" fill="none" stroke="#D85A30" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.8"/>
  <text x="581" y="20" text-anchor="middle" font-size="12" fill="#D85A30" font-weight="600">Інтернет / WAN</text>
  <rect x="506" y="52" width="150" height="42" rx="6" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
  <text x="581" y="68" text-anchor="middle" font-size="12" font-weight="600" fill="#4A1B0C">Веб-сервер</text>
  <text x="581" y="84" text-anchor="middle" font-size="11" fill="#993C1D">8.8.8.8:80</text>
  <rect x="506" y="222" width="150" height="50" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="581" y="242" text-anchor="middle" font-size="12" font-weight="600" fill="#444441">Зловмисник</text>
  <text x="581" y="260" text-anchor="middle" font-size="11" fill="#888780">1.2.3.4</text>
  <!-- LAN → GW arrows -->
  <line x1="174" y1="73" x2="254" y2="148" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="174" y1="129" x2="254" y2="158" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="176" y="114" width="72" height="16" rx="3" fill="#E1F5EE"/>
  <text x="212" y="126" text-anchor="middle" font-size="10" fill="#085041" font-weight="600">MASQUERADE</text>
  <!-- GW → Internet -->
  <line x1="424" y1="148" x2="504" y2="73" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="424" y="100" width="76" height="16" rx="3" fill="#FAECE7"/>
  <text x="462" y="112" text-anchor="middle" font-size="10" fill="#993C1D" font-weight="600">src: 203.0.113.5</text>
  <!-- DNAT: Internet → Server -->
  <line x1="504" y1="247" x2="424" y2="190" stroke="#7F77DD" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <line x1="256" y1="185" x2="174" y2="240" stroke="#7F77DD" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <rect x="290" y="216" width="100" height="16" rx="3" fill="#EEEDFE"/>
  <text x="340" y="228" text-anchor="middle" font-size="10" fill="#26215C" font-weight="600">DNAT :80 → :8080</text>
  <!-- Block attacker -->
  <rect x="422" y="240" width="78" height="16" rx="3" fill="#FAECE7"/>
  <text x="461" y="252" text-anchor="middle" font-size="10" fill="#993C1D" font-weight="600">INPUT DROP</text>
  <!-- Legend -->
  <line x1="10" y1="302" x2="44" y2="302" stroke="#1D9E75" stroke-width="1.5"/>
  <text x="50" y="306" font-size="10" fill="#5F5E5A">MASQUERADE / SNAT</text>
  <line x1="200" y1="302" x2="234" y2="302" stroke="#7F77DD" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="240" y="306" font-size="10" fill="#5F5E5A">DNAT (port forwarding)</text>
  <line x1="400" y1="302" x2="434" y2="302" stroke="#D85A30" stroke-width="1.5"/>
  <text x="440" y="306" font-size="10" fill="#5F5E5A">FILTER DROP</text>
</svg>
