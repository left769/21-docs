<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- ISP 1 PRIMARY -->
  <rect x="30" y="28" width="160" height="60" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="110" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">ISP 1 — Primary</text>
  <text x="110" y="70" text-anchor="middle" font-size="11" fill="#0F6E56">GW: 203.0.113.97</text>
  <text x="110" y="84" text-anchor="middle" font-size="10" fill="#1D9E75">Et0/1: 203.0.113.98/30</text>

  <!-- ISP 2 BACKUP -->
  <rect x="490" y="28" width="160" height="60" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="570" y="52" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">ISP 2 — Backup</text>
  <text x="570" y="70" text-anchor="middle" font-size="11" fill="#5F5E5A">GW: 192.0.2.254</text>
  <text x="570" y="84" text-anchor="middle" font-size="10" fill="#888780">Et0/0: 192.0.2.21/24</text>

  <!-- Cisco Router -->
  <rect x="265" y="138" width="150" height="78" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="340" y="162" text-anchor="middle" font-size="13" font-weight="600" fill="#633806">Cisco Router</text>
  <text x="340" y="179" text-anchor="middle" font-size="10" fill="#854F0B">Et0/1: 203.0.113.98</text>
  <text x="340" y="193" text-anchor="middle" font-size="10" fill="#888780">Et0/0: 192.0.2.21</text>
  <text x="340" y="207" text-anchor="middle" font-size="10" fill="#854F0B">Et0/2: 192.168.50.1</text>

  <!-- SLA probe target -->
  <rect x="528" y="145" width="122" height="44" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="589" y="163" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">SLA probe target</text>
  <text x="589" y="179" text-anchor="middle" font-size="11" fill="#185FA5">1.0.0.1 (Cloudflare)</text>

  <!-- LAN -->
  <rect x="265" y="278" width="150" height="50" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.8"/>
  <text x="340" y="298" text-anchor="middle" font-size="13" font-weight="600" fill="#26215C">LAN</text>
  <text x="340" y="315" text-anchor="middle" font-size="11" fill="#534AB7">192.168.50.0/24</text>

  <!-- Link Router ↔ ISP1 -->
  <line x1="280" y1="155" x2="190" y2="88" stroke="#1D9E75" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="188" y="110" width="82" height="16" rx="4" fill="#E1F5EE"/>
  <text x="229" y="122" text-anchor="middle" font-size="10" fill="#085041" font-weight="600">PRIMARY · AD=1</text>

  <!-- Link Router ↔ ISP2 (dashed) -->
  <line x1="400" y1="155" x2="490" y2="88" stroke="#B4B2A9" stroke-width="2" stroke-dasharray="7 4" marker-end="url(#arr)"/>
  <rect x="400" y="110" width="96" height="16" rx="4" fill="#F1EFE8"/>
  <text x="448" y="122" text-anchor="middle" font-size="10" fill="#5F5E5A" font-weight="600">BACKUP · AD=11</text>

  <!-- ICMP probe arrow -->
  <line x1="415" y1="168" x2="526" y2="168" stroke="#378ADD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="470" y="158" text-anchor="middle" font-size="10" fill="#378ADD">icmp-echo probe</text>

  <!-- Track label -->
  <rect x="236" y="232" width="208" height="16" rx="4" fill="#FAEEDA"/>
  <text x="340" y="244" text-anchor="middle" font-size="10" fill="#854F0B">track 1 → ip sla 1 reachability</text>

  <!-- Router ↔ LAN -->
  <line x1="340" y1="216" x2="340" y2="276" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Route labels bottom -->
  <text x="110" y="112" text-anchor="middle" font-size="10" fill="#1D9E75">ip route 0.0.0.0/0 track 1</text>
  <text x="570" y="108" text-anchor="middle" font-size="10" fill="#888780">ip route 0.0.0.0/0 metric 10</text>
</svg>
