  <text x="490" y="252" text-anchor="middle" font-size="10" fill="#185FA5">filter · nat</text>
  <!-- FORWARD -->
  <rect x="238" y="264" width="86" height="50" rx="6" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="281" y="285" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">FORWARD</text>
  <text x="281" y="302" text-anchor="middle" font-size="10" fill="#854F0B">filter</text>
  <!-- POSTROUTING -->
  <rect x="560" y="258" width="110" height="54" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="615" y="279" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">POSTROUTING</text>
  <text x="615" y="297" text-anchor="middle" font-size="10" fill="#534AB7">nat · mangle</text>
  <!-- Outgoing -->
  <rect x="560" y="153" width="80" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="600" y="171" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Пакет</text>
  <text x="600" y="187" text-anchor="middle" font-size="11" fill="#0F6E56">вихідний</text>
  <!-- Arrows -->
  <line x1="90" y1="180" x2="106" y2="180" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="214" y1="180" x2="236" y2="180" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="310" y1="166" x2="342" y2="132" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="424" y1="121" x2="448" y2="121" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="498" y1="146" x2="498" y2="212" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="281" y1="207" x2="281" y2="262" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="324" y1="289" x2="558" y2="289" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="530" y1="249" x2="596" y2="262" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="615" y1="258" x2="600" y2="199" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- Legend -->
  <rect x="10" y="326" width="14" height="12" rx="2" fill="#EEEDFE" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="28" y="337" font-size="10" fill="#5F5E5A">PREROUTING/POSTROUTING: nat, mangle</text>
  <rect x="320" y="326" width="14" height="12" rx="2" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
  <text x="338" y="337" font-size="10" fill="#5F5E5A">INPUT/OUTPUT/FORWARD: filter</text>
</svg>
