<svg width="100%" viewBox="0 0 680 360" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- Incoming -->
  <rect x="10" y="158" width="80" height="44" rx="6" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="50" y="176" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Пакет</text>
  <text x="50" y="192" text-anchor="middle" font-size="11" fill="#0F6E56">вхідний</text>
  <!-- PREROUTING -->
  <rect x="108" y="153" width="106" height="54" rx="6" fill="#EEEDFE" stroke="#7F77DD" stroke-width="1"/>
  <text x="161" y="174" text-anchor="middle" font-size="12" font-weight="600" fill="#26215C">PREROUTING</text>
  <text x="161" y="192" text-anchor="middle" font-size="10" fill="#534AB7">nat · mangle</text>
  <!-- Routing -->
  <rect x="238" y="153" width="86" height="54" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="281" y="174" text-anchor="middle" font-size="11" fill="#5F5E5A">Таблиця</text>
  <text x="281" y="190" text-anchor="middle" font-size="11" fill="#5F5E5A">маршр.</text>
  <!-- INPUT -->
  <rect x="344" y="96" width="80" height="50" rx="6" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="384" y="117" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">INPUT</text>
  <text x="384" y="134" text-anchor="middle" font-size="10" fill="#185FA5">filter</text>
  <!-- Local process -->
  <rect x="450" y="96" width="96" height="50" rx="6" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="498" y="117" text-anchor="middle" font-size="11" fill="#5F5E5A">Локальний</text>
  <text x="498" y="133" text-anchor="middle" font-size="11" fill="#5F5E5A">процес</text>
