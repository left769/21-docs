  <text x="340" y="63" text-anchor="middle" font-size="11" fill="#854F0B">Root Bridge · Priority 4096</text>
  <text x="340" y="90" text-anchor="middle" font-size="12" fill="#BA7517" font-weight="500">★ Root Bridge</text>

  <!-- SW-B -->
  <rect x="60" y="240" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
