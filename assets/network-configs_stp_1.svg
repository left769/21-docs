  <text x="130" y="283" text-anchor="middle" font-size="11" fill="#0F6E56">Priority 32768</text>

  <!-- SW-C -->
  <rect x="480" y="240" width="140" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="550" y="264" text-anchor="middle" font-size="13" font-weight="600" fill="#085041">SW-C</text>
  <text x="550" y="283" text-anchor="middle" font-size="11" fill="#0F6E56">Priority 32768</text>

  <!-- Link A-B forwarding -->
  <line x1="290" y1="76" x2="170" y2="240" stroke="#1D9E75" stroke-width="2"/>
  <text x="205" y="148" text-anchor="middle" font-size="11" fill="#1D9E75" font-weight="600">RP</text>
  <text x="248" y="122" text-anchor="middle" font-size="11" fill="#1D9E75" font-weight="600">DP</text>

  <!-- Link A-C forwarding -->
  <line x1="390" y1="76" x2="510" y2="240" stroke="#1D9E75" stroke-width="2"/>
  <text x="465" y="148" text-anchor="middle" font-size="11" fill="#1D9E75" font-weight="600">RP</text>
  <text x="432" y="122" text-anchor="middle" font-size="11" fill="#1D9E75" font-weight="600">DP</text>

  <!-- Link B-C blocked -->
  <line x1="200" y1="268" x2="480" y2="268" stroke="#D85A30" stroke-width="2" stroke-dasharray="8 5"/>
  <circle cx="212" cy="268" r="9" fill="#FAECE7" stroke="#D85A30" stroke-width="1.2"/>
  <text x="212" y="272" text-anchor="middle" font-size="10" fill="#993C1D" font-weight="700">B</text>
  <circle cx="468" cy="268" r="9" fill="#FAECE7" stroke="#D85A30" stroke-width="1.2"/>
