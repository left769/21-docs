      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Root Bridge SW-A -->
  <rect x="270" y="20" width="140" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
