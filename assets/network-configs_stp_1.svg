  <text x="340" y="255" text-anchor="middle" font-size="11" fill="#D85A30">Заблокований канал (Blocking)</text>

  <!-- Legend -->
  <line x1="40" y1="338" x2="80" y2="338" stroke="#1D9E75" stroke-width="2"/>
  <text x="86" y="342" font-size="11" fill="#5F5E5A">Forwarding (активний)</text>
  <line x1="260" y1="338" x2="300" y2="338" stroke="#D85A30" stroke-width="2" stroke-dasharray="6 4"/>
