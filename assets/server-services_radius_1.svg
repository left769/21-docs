<svg width="100%" viewBox="0 0 680 380" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <!-- User -->
  <rect x="20" y="150" width="120" height="54" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
  <text x="80" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#085041">Адміністратор</text>
  <text x="80" y="190" text-anchor="middle" font-size="11" fill="#0F6E56">SSH / Telnet</text>
  <!-- NAS -->
  <rect x="265" y="150" width="150" height="54" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="340" y="168" text-anchor="middle" font-size="12" font-weight="600" fill="#633806">NAS (Cisco/MikroTik)</text>
  <text x="340" y="187" text-anchor="middle" font-size="11" fill="#854F0B">Network Access Server</text>
  <!-- RADIUS -->
  <rect x="548" y="150" width="112" height="54" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="604" y="170" text-anchor="middle" font-size="12" font-weight="600" fill="#042C53">FreeRADIUS</text>
  <text x="604" y="188" text-anchor="middle" font-size="11" fill="#185FA5">AAA Server</text>
  <!-- Step 1 -->
  <line x1="140" y1="168" x2="263" y2="168" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="152" y="150" width="98" height="16" rx="3" fill="#E1F5EE"/>
  <text x="201" y="162" text-anchor="middle" font-size="10" fill="#085041" font-weight="600">① Login request</text>
  <!-- Step 2 -->
  <line x1="415" y1="162" x2="546" y2="162" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="420" y="144" width="118" height="16" rx="3" fill="#E6F1FB"/>
  <text x="479" y="156" text-anchor="middle" font-size="10" fill="#042C53" font-weight="600">② Access-Request (UDP/1812)</text>
  <!-- Step 3 -->
  <line x1="546" y1="192" x2="415" y2="192" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="420" y="192" width="118" height="16" rx="3" fill="#FAECE7"/>
  <text x="479" y="204" text-anchor="middle" font-size="10" fill="#993C1D" font-weight="600">③ Access-Accept / Reject</text>
  <!-- Step 4 -->
  <line x1="263" y1="192" x2="140" y2="192" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="152" y="192" width="98" height="16" rx="3" fill="#E1F5EE"/>
  <text x="201" y="204" text-anchor="middle" font-size="10" fill="#085041" font-weight="600">④ Allow / Deny</text>
  <!-- Step 5 accounting -->
  <line x1="415" y1="200" x2="546" y2="218" stroke="#7F77DD" stroke-width="1" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <rect x="420" y="214" width="118" height="16" rx="3" fill="#EEEDFE"/>
  <text x="479" y="226" text-anchor="middle" font-size="10" fill="#26215C" font-weight="600">⑤ Accounting (UDP/1813)</text>

  <!-- AAA legend -->
  <rect x="20" y="276" width="640" height="88" rx="10" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="340" y="296" text-anchor="middle" font-size="12" font-weight="600" fill="#444441">Три компоненти AAA</text>
  <text x="60" y="318" font-size="11" font-weight="600" fill="#1D9E75">Authentication</text>
  <text x="60" y="334" font-size="10" fill="#5F5E5A">Хто ти? Перевірка</text>
  <text x="60" y="348" font-size="10" fill="#5F5E5A">логіна/пароля.</text>
  <text x="270" y="318" font-size="11" font-weight="600" fill="#378ADD">Authorization</text>
  <text x="270" y="334" font-size="10" fill="#5F5E5A">Що ти можеш? Рівень</text>
  <text x="270" y="348" font-size="10" fill="#5F5E5A">привілеїв (priv-lvl).</text>
  <text x="480" y="318" font-size="11" font-weight="600" fill="#7F77DD">Accounting</text>
  <text x="480" y="334" font-size="10" fill="#5F5E5A">Що ти робив? Сесії,</text>
  <text x="480" y="348" font-size="10" fill="#5F5E5A">команди, час роботи.</text>
</svg>
