<svg width="100%" viewBox="0 0 680 340" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Internal zone -->
  <rect x="20" y="30" width="230" height="280" rx="14" fill="none" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.8"/>
  <text x="135" y="21" text-anchor="middle" font-size="12" fill="#1D9E75" font-weight="500">Внутрішня мережа</text>

  <!-- Internet zone -->
  <rect x="460" y="30" width="200" height="280" rx="14" fill="none" stroke="#378ADD" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.8"/>
  <text x="560" y="21" text-anchor="middle" font-size="12" fill="#378ADD" font-weight="500">Інтернет</text>

  <!-- Host 1 -->
  <rect x="40" y="68" width="160" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="120" y="89" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">PC-1</text>
  <text x="120" y="107" text-anchor="middle" font-size="11" fill="#0F6E56">172.16.0.10</text>

  <!-- Host 2 -->
  <rect x="40" y="146" width="160" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="120" y="167" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">PC-2</text>
  <text x="120" y="185" text-anchor="middle" font-size="11" fill="#0F6E56">172.16.0.20</text>

  <!-- Host 3 -->
  <rect x="40" y="224" width="160" height="48" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="120" y="245" text-anchor="middle" font-size="13" font-weight="500" fill="#085041">PC-3</text>
  <text x="120" y="263" text-anchor="middle" font-size="11" fill="#0F6E56">172.16.0.30</text>

  <!-- Router -->
  <rect x="286" y="126" width="108" height="88" rx="10" fill="#FAEEDA" stroke="#BA7517" stroke-width="1"/>
  <text x="340" y="158" text-anchor="middle" font-size="13" font-weight="500" fill="#633806">Router</text>
  <text x="340" y="176" text-anchor="middle" font-size="11" fill="#854F0B">NAT / PAT</text>

  <!-- Interface labels -->
  <text x="340" y="228" text-anchor="middle" font-size="10" fill="#1D9E75">fa0/0: 172.16.0.1</text>
  <text x="340" y="242" text-anchor="middle" font-size="10" fill="#378ADD">se0/0: 203.0.113.5</text>

  <!-- Web server -->
  <rect x="478" y="140" width="162" height="60" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="559" y="165" text-anchor="middle" font-size="13" font-weight="500" fill="#042C53">Веб-сервер</text>
  <text x="559" y="183" text-anchor="middle" font-size="11" fill="#185FA5">8.8.8.8</text>

  <!-- Arrows: hosts to router -->
  <line x1="200" y1="92" x2="284" y2="148" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="200" y1="170" x2="284" y2="163" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="200" y1="248" x2="284" y2="172" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Main arrow: router to internet -->
  <line x1="394" y1="170" x2="476" y2="170" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PAT label badge -->
  <rect x="402" y="150" width="76" height="16" rx="4" fill="#FAEEDA"/>
  <text x="440" y="162" text-anchor="middle" font-size="10" fill="#854F0B">203.0.113.5</text>

  <!-- Legend -->
  <rect x="20" y="318" width="12" height="8" rx="2" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="36" y="326" font-size="10" fill="#5F5E5A">Приватна (сіра) адреса</text>
  <rect x="200" y="318" width="12" height="8" rx="2" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.8"/>
  <text x="216" y="326" font-size="10" fill="#5F5E5A">Публічна (біла) адреса</text>
  <rect x="380" y="318" width="12" height="8" rx="2" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="396" y="326" font-size="10" fill="#5F5E5A">NAT-маршрутизатор</text>
</svg>
