<svg width="100%" viewBox="0 0 680 200" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Disabled -->
  <rect x="20" y="72" width="100" height="56" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="70" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#444441">Disabled</text>
  <text x="70" y="114" text-anchor="middle" font-size="11" fill="#888780">Порт вимкнено</text>

  <!-- Blocking -->
  <rect x="154" y="72" width="104" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.8"/>
  <text x="206" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#4A1B0C">Blocking</text>
  <text x="206" y="114" text-anchor="middle" font-size="11" fill="#993C1D">Слухає BPDU</text>

  <!-- Listening -->
  <rect x="292" y="72" width="104" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="344" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Listening</text>
  <text x="344" y="114" text-anchor="middle" font-size="11" fill="#854F0B">15 сек (STP)</text>

  <!-- Learning -->
  <rect x="430" y="72" width="104" height="56" rx="8" fill="#FAEEDA" stroke="#BA7517" stroke-width="0.8"/>
  <text x="482" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#412402">Learning</text>
  <text x="482" y="114" text-anchor="middle" font-size="11" fill="#854F0B">15 сек (STP)</text>

  <!-- Forwarding -->
  <rect x="568" y="72" width="104" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="620" y="96" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Forwarding</text>
  <text x="620" y="114" text-anchor="middle" font-size="11" fill="#0F6E56">Трафік іде ✓</text>

  <!-- Forward arrows -->
  <line x1="120" y1="100" x2="152" y2="100" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="258" y1="100" x2="290" y2="100" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="396" y1="100" x2="428" y2="100" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="534" y1="100" x2="566" y2="100" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Back arrow topology change -->
  <path d="M620 72 Q620 30 344 30 Q206 30 206 72" fill="none" stroke="#D85A30" stroke-width="1" stroke-dasharray="5 4" marker-end="url(#arr)"/>
  <text x="340" y="22" text-anchor="middle" font-size="10" fill="#D85A30">зміна топології</text>

  <!-- Notes -->
  <text x="340" y="158" text-anchor="middle" font-size="11" fill="#5F5E5A">Classic STP: конвергенція ~30–50 сек (15 + 15 + таймери)</text>
  <text x="340" y="176" text-anchor="middle" font-size="11" fill="#1D9E75">Rapid STP (RSTP): конвергенція менше 2 сек (Listening/Learning об'єднані)</text>
</svg>
